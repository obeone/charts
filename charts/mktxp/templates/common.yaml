{{/* Make sure all variables are set properly */}}
{{- include "common.values.setup" . }}

{{/* Append the harcoded settings */}}
{{- define "mktxp.harcodedValues" -}}
  {{- if .Values.configmap.config.enabled }}
    {{/* Do a change on podAnnotation to force a restart */}}
    podAnnotations:
      configmap/checksum: "{{ .Values.configmap.config.data | toYaml | sha256sum }}"

    {{/* Append the configMap volume to the volumes */}}
    persistence:
      config:
        enabled: true
        type: "configMap"
        name: "{{ printf "%v-config" (include "common.names.fullname" .) }}"
        mountPath: "/tmp/cm"
      root:
        enabled: true
        type: emptyDir
        mountPath: /home/mktxp/mktxp/

    {{/* Run the pod as the mktxp user that ships in the upstream image
         (uid=1000, gid=1000). fsGroup makes the emptyDir group-owned by
         that gid so the cp init-container can produce files writable by
         the main container. Override via .Values.podSecurityContext if
         the upstream image ever changes its uid/gid again. */}}
    podSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000

    initContainers:
      cp:
        image: alpine
        command:
        - sh
        - -c
        - |
          set -e
          cp /tmp/cm/mktxp.conf /home/mktxp/mktxp/mktxp.conf
          cp /tmp/cm/_mktxp.conf /home/mktxp/mktxp/_mktxp.conf
          chmod u+w /home/mktxp/mktxp/mktxp.conf /home/mktxp/mktxp/_mktxp.conf
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
        volumeMounts:
        - name: config
          mountPath: /tmp/cm
        - name: root
          mountPath: /home/mktxp/mktxp
    {{- end -}}
{{- end -}}

{{/* Applying change to original values.yaml content */}}
{{- $_ := mergeOverwrite .Values (include "mktxp.harcodedValues" . | fromYaml) -}}


{{ include "common.all" . }}
